<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obliteride Sky — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #141034; color: #f5efe6;
      min-height: 100vh; padding: 2rem 1rem;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    h2 { font-size: 1rem; margin: 1.6rem 0 .6rem; color: #b9b0d6; text-transform: uppercase; letter-spacing: .1em; }
    p { color: #b9b0d6; line-height: 1.5; margin-bottom: .8rem; }
    input, textarea {
      width: 100%; font: inherit; color: inherit;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px; padding: .7rem .9rem; margin-bottom: .6rem;
    }
    textarea { resize: vertical; min-height: 4.5em; }
    button {
      font: inherit; font-weight: 600; cursor: pointer;
      border: none; border-radius: 999px; padding: .55rem 1.1rem;
    }
    .primary { background: linear-gradient(135deg, #ff7a3d, #ffb347); color: #23100a; }
    .save     { background: rgba(255,255,255,.12); color: #f5efe6; }
    .approve { background: #2e7d4f; color: #fff; }
    .reject  { background: #7d2e2e; color: #fff; }
    .card {
      background: #1b1638; border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px; padding: 1rem 1.2rem; margin-bottom: .8rem;
    }
    .card .type { font-size: .72rem; text-transform: uppercase; letter-spacing: .14em; color: #ffb347; margin-bottom: .5rem; }
    .card .msg-input { font-size: 1.02rem; }
    .card .name-row { display: flex; gap: .6rem; align-items: center; margin-bottom: .7rem; }
    .card .name-input { margin-bottom: 0; flex: 1; }
    .card .show-name-label { display: flex; align-items: center; gap: .4rem; font-size: .82rem; color: #b9b0d6; white-space: nowrap; }
    .card .actions { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
    .card .save-status { font-size: .82rem; color: #7fd99a; margin: 0; }
    .empty { color: #6f6894; font-style: italic; }
    .notice { background: rgba(255,179,71,.12); border: 1px solid #ffb347; border-radius: 10px; padding: .8rem 1rem; margin-bottom: 1rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🏮 Obliteride Sky — Admin</h1>

    <div id="not-configured" class="notice hidden">
      Supabase isn't configured yet. Add your project URL and anon key to <code>js/config.js</code> first (see README).
    </div>

    <section id="login" class="hidden">
      <p>Sign in with the admin email you set in <code>supabase/schema.sql</code>. You'll get a magic link — no password needed.</p>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      <button class="primary" id="send-link">Send magic link</button>
      <p id="login-status"></p>
    </section>

    <section id="panel" class="hidden">
      <p>Signed in as <strong id="whoami"></strong> · <button id="signout">Sign out</button></p>
      <h2>Pending approval</h2>
      <div id="pending"></div>
      <h2>Live in the sky</h2>
      <div id="approved"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    (async () => {
      const $ = (s) => document.querySelector(s);
      if (!CONFIG.SUPABASE_URL || !CONFIG.SUPABASE_ANON_KEY) {
        $("#not-configured").classList.remove("hidden");
        return;
      }
      const db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
      const TYPE_LABEL = { honor: "In honor of", memory: "In memory of", message: "Special message" };

      function currentFields(el) {
        return {
          message: el.querySelector(".msg-input").value.trim(),
          display_name: el.querySelector(".name-input").value.trim(),
          show_name: el.querySelector(".show-name-input").checked,
        };
      }

      function card(t, pending) {
        const el = document.createElement("div");
        el.className = "card";
        el.innerHTML = `
          <div class="type">${TYPE_LABEL[t.type] || t.type}</div>
          <textarea class="msg-input" maxlength="280" rows="2"></textarea>
          <div class="name-row">
            <input class="name-input" placeholder="Name (optional)" />
            <label class="show-name-label"><input type="checkbox" class="show-name-input" /> Show name</label>
          </div>
          <div class="actions">
            <button class="save">💾 Save</button>
            ${pending ? '<button class="approve">✓ Approve</button>' : ""}
            <button class="reject">${pending ? "✕ Reject" : "Remove"}</button>
            <p class="save-status hidden"></p>
          </div>`;
        el.querySelector(".msg-input").value = t.message;
        el.querySelector(".name-input").value = t.display_name || "";
        el.querySelector(".show-name-input").checked = !!t.show_name;

        function flashStatus(text, ok = true) {
          const status = el.querySelector(".save-status");
          status.textContent = text;
          status.style.color = ok ? "#7fd99a" : "#ff7a7a";
          status.classList.remove("hidden");
          setTimeout(() => status.classList.add("hidden"), 2200);
        }

        el.querySelector(".save").onclick = async () => {
          const { error } = await db.from("tributes").update(currentFields(el)).eq("id", t.id);
          flashStatus(error ? "Save failed: " + error.message : "Saved ✓", !error);
        };
        if (pending) el.querySelector(".approve").onclick = async () => {
          const { error } = await db.from("tributes")
            .update({ ...currentFields(el), approved: true }).eq("id", t.id);
          if (error) { flashStatus("Approve failed: " + error.message, false); return; }
          refresh();
        };
        el.querySelector(".reject").onclick = async () => {
          if (!confirm("Delete this tribute permanently?")) return;
          await db.from("tributes").delete().eq("id", t.id);
          refresh();
        };
        return el;
      }

      function render(target, rows, pending) {
        target.replaceChildren();
        if (!rows.length) {
          target.innerHTML = '<p class="empty">Nothing here.</p>';
          return;
        }
        rows.forEach((t) => target.appendChild(card(t, pending)));
      }

      async function refresh() {
        const { data, error } = await db
          .from("tributes").select("*").order("created_at", { ascending: false });
        if (error) { alert("Load failed: " + error.message + "\n(Are you signed in as the admin email?)"); return; }
        render($("#pending"), data.filter((t) => !t.approved), true);
        render($("#approved"), data.filter((t) => t.approved), false);
      }

      async function showState() {
        const { data: { session } } = await db.auth.getSession();
        $("#login").classList.toggle("hidden", !!session);
        $("#panel").classList.toggle("hidden", !session);
        if (session) {
          $("#whoami").textContent = session.user.email;
          refresh();
        }
      }

      $("#send-link").onclick = async () => {
        const email = $("#email").value.trim();
        if (!email) return;
        const { error } = await db.auth.signInWithOtp({
          email, options: { emailRedirectTo: location.href },
        });
        $("#login-status").textContent = error
          ? "Error: " + error.message
          : "Check your inbox for the sign-in link ✉️";
      };
      $("#signout").onclick = async () => { await db.auth.signOut(); showState(); };

      db.auth.onAuthStateChange(showState);
      showState();
    })();
  </script>
</body>
</html>
